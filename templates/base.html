<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ideo Project{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:wght@500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f7f9;
            --surface: #ffffff;
            --text: #16202d;
            --text-muted: #637083;
            --line: #d7dfe8;
            --brand: #1d766f;
            --brand-strong: #155f5a;
            --accent: #b85c38;
            --researcher: #8f3a54;
            --participant: #1d766f;
            --radius: 8px;
            --focus: rgba(29, 118, 111, 0.18);
        }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            background: var(--bg);
            min-height: 100vh;
            font-size: 1rem;
            line-height: 1.62;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, h4, h5, h6, .navbar-brand {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            letter-spacing: 0;
            color: var(--text);
            font-weight: 750;
            line-height: 1.18;
        }

        h1, .h1 { font-size: clamp(2rem, 4vw, 3rem); }
        h2, .h2 { font-size: clamp(1.65rem, 3vw, 2.25rem); }
        h3, .h3 { font-size: clamp(1.35rem, 2.3vw, 1.8rem); }
        h4, .h4 { font-size: clamp(1.15rem, 2vw, 1.45rem); }
        h5, .h5 { font-size: 1.05rem; }

        p {
            margin-bottom: 1rem;
        }

        strong,
        .fw-bold {
            font-weight: 700 !important;
        }

        .navbar {
            background: #172033 !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 8px 20px rgba(23, 32, 51, 0.12);
            min-height: 64px;
        }

        .navbar-brand {
            color: #fff;
            font-size: 1rem;
            text-transform: none;
            font-weight: 800;
        }

        .card {
            border: 1px solid rgba(215, 223, 232, 0.88);
            border-radius: var(--radius);
            background: var(--surface);
            box-shadow: 0 14px 34px rgba(23, 32, 51, 0.075);
            overflow: hidden;
        }

        .card-header {
            border-bottom: 1px solid var(--line);
            background: #fbfcfd;
            padding: 1.05rem 1.25rem;
        }

        .card-body {
            color: var(--text);
        }

        .btn {
            border-radius: 8px;
            font-weight: 700;
            letter-spacing: 0;
            padding: 0.66rem 1rem;
            line-height: 1.25;
        }

        .btn-lg {
            padding: 0.82rem 1.15rem;
            font-size: 1rem;
        }

        .btn-primary {
            background: var(--brand);
            border-color: var(--brand-strong);
        }

        .btn-primary:hover,
        .btn-primary:focus {
            background: var(--brand-strong);
            border-color: #0f5250;
        }

        .btn-success {
            background: #277245;
            border-color: #166534;
        }

        .btn-warning {
            background: #a45d21;
            border-color: #b45309;
            color: #fff;
        }

        .btn-outline-light {
            border-color: rgba(255,255,255,0.72);
        }

        .form-control,
        .form-select {
            border-radius: 8px;
            border-color: var(--line);
            padding-top: 0.65rem;
            padding-bottom: 0.65rem;
            color: var(--text);
            font-size: 1rem;
            line-height: 1.45;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #6dd6cb;
            box-shadow: 0 0 0 0.22rem var(--focus);
        }

        .form-label,
        legend {
            color: var(--text);
            font-weight: 700;
            line-height: 1.35;
        }

        .form-check {
            min-height: 2rem;
            padding-left: 2.15rem;
        }

        .form-check-input {
            width: 1.25rem;
            height: 1.25rem;
            margin-top: 0.22rem;
            margin-left: -2.15rem;
            border: 2px solid #152233;
        }

        .form-check-input:checked {
            background-color: var(--brand);
            border-color: var(--brand);
        }

        .form-check-input:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 0.22rem var(--focus);
        }

        .form-check-label {
            font-size: 1.05rem;
            line-height: 1.45;
        }

        .table {
            --bs-table-bg: transparent;
            color: var(--text);
        }

        .table > :not(caption) > * > * {
            border-bottom-color: var(--line);
            vertical-align: middle;
            padding: 0.9rem 0.75rem;
        }

        .table thead th {
            color: #263448;
            font-weight: 750;
        }

        .list-group-item {
            border-color: var(--line);
            background: rgba(255,255,255,0.72);
            padding: 0.9rem 1rem;
        }

        .alert {
            border: 1px solid var(--line);
            border-radius: 8px;
            line-height: 1.5;
        }

        .text-muted {
            color: var(--text-muted) !important;
        }

        .app-wrap {
            animation: fade-up 0.35s ease-out;
            max-width: 1180px;
        }

        .stage-badge {
            font-size: 0.86rem;
            padding: 0.45em 0.85em;
            border-radius: 999px;
            background: rgba(15, 118, 110, 0.15) !important;
            color: var(--brand-strong);
            border: 1px solid rgba(15, 118, 110, 0.25);
            font-weight: 700;
            line-height: 1.2;
        }

        .role-researcher,
        .role-participant {
            color: #fff;
            border-radius: 999px;
            padding: 0.46em 0.88em;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0;
            line-height: 1.2;
        }

        .role-researcher { background: var(--researcher); }
        .role-participant { background: var(--participant); }

        .question-row {
            padding: 1rem;
            border-bottom: 1px solid #eee;
        }

        .question-row:hover {
            background-color: rgba(15, 118, 110, 0.05);
        }

        .btn-answer {
            min-width: 60px;
        }

        .likert-scale {
            display: flex;
            justify-content: space-between;
            max-width: 400px;
        }

        .likert-scale label {
            text-align: center;
            cursor: pointer;
        }

        .likert-scale input[type="radio"] {
            display: block;
            margin: 0 auto;
        }

        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <span class="navbar-brand">Ideo Project</span>
            {% block nav_right %}{% endblock %}
        </div>
    </nav>

    <div class="container app-wrap pb-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
