{% extends 'base.html' %}

{% block title %}Join Experiment{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">Join Session</h4>
            </div>
            <div class="card-body p-4">
                <p class="text-muted mb-4">Enter your assigned role code to continue.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="code" class="form-label">Experiment Code</label>
                        <input type="text" class="form-control form-control-lg text-center" 
                               id="code" name="code" placeholder="R-12 OVS" 
                               required autofocus
                               style="text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700;">
                        <div class="form-text mt-2">R-XX OVS/OVM researcher or P-XX OVS/OVM participant</div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg">Continue</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
